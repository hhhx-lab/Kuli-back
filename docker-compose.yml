services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: kuli
      POSTGRES_PASSWORD: kuli
      POSTGRES_DB: kuli
    ports:
      - "5432:5432"
    volumes:
      - kuli-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kuli -d kuli"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  kuli-postgres-data:
